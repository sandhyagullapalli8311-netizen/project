<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Data Setup</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 4px; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 10px; }
        button:hover { background: #0056b3; }
        .data-preview { background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 10px 0; font-family: monospace; font-size: 0.9rem; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Admin Panel Data Setup</h1>
        
        <div id="status" class="status info">
            Setting up admin panel data...
        </div>
        
        <button onclick="setupSampleData()">📊 Create Sample Data</button>
        <button onclick="checkCurrentData()">🔍 Check Current Data</button>
        <button onclick="clearAllData()">🗑️ Clear All Data</button>
        <button onclick="openAdminPanel()">👨‍💼 Open Admin Panel</button>
        
        <div id="results"></div>
    </div>

    <script>
        function showStatus(message, type = 'info') {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function showResults(content) {
            document.getElementById('results').innerHTML = content;
        }

                }
            ];
            
            // Sample Orders
            const sampleOrders = [
                {
                    id: 'ORD001',

                    phone: '+1-555-0123',
                    items: [
                        {
                            id: '1',
                            name: 'Laptop Pro 15"',
                            price: 1299.99,
                            quantity: 1,
                            image: 'laptop'
                        },
                        {
                            id: '2',
                            name: 'Wireless Mouse',
                            price: 29.99,
                            quantity: 1,
                            image: 'mouse'
                        }
                    ],
                    subtotal: 1329.98,
                    shippingCost: 15.00,
                    total: 1344.98,
                    status: 'pending',
                    paymentMethod: 'credit_card',
                    shippingAddress: {
                        street: '123 Main St',
                        city: 'New York',
                        state: 'NY',

                },
                {
                    id: 'ORD002',
                    customer: 'Sarah Johnson',
                    email: 'sarah.j@email.com',
                    phone: '+1-555-0124',
                    items: [
                        {

            // Sample Customers
            const sampleCustomers = [
                {

            // Save to localStorage
            localStorage.setItem('products', JSON.stringify(sampleProducts));
            localStorage.setItem('orders', JSON.stringify(sampleOrders));
            localStorage.setItem('users', JSON.stringify(sampleCustomers));
            
            showStatus('✅ Sample data created successfully!', 'success');
            showResults(`
                <div style="background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 10px 0;">

                    <p><strong>📋 Orders:</strong> ${sampleOrders.length} orders</p>
                    <p><strong>👥 Customers:</strong> ${sampleCustomers.length} customers</p>

        function checkCurrentData() {
            showStatus('Checking current data...', 'info');
            
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const customers = JSON.parse(localStorage.getItem('users') || '[]');
            
            showResults(`
                <div style="background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 10px 0;">
                    <h3>📊 Current Data Status</h3>
                    <p><strong>📦 Products:</strong> ${products.length} items</p>
                    <p><strong>📋 Orders:</strong> ${orders.length} orders</p>
                    <p><strong>👥 Customers:</strong> ${customers.length} customers</p>
                    
                    ${orders.length > 0 ? `
                        <hr>
                        <h4>📋 Recent Orders:</h4>
                        <div class="data-preview">
${orders.slice(0, 3).map(order => `
Order ID: ${order.id}
Customer: ${order.customer}
Total: $${order.total}
Status: ${order.status}
Items: ${order.items ? order.items.length : 0}
---
`).join('')}
                        </div>
                    ` : '<p><strong>⚠️ No orders found. Click "Create Sample Data" to add sample orders.</strong></p>'}
                </div>
            `);
        }

        function clearAllData() {
            if (confirm('Are you sure you want to clear all data? This will remove all products, orders, and customers.')) {
                localStorage.removeItem('products');
                localStorage.removeItem('orders');
                localStorage.removeItem('users');
                
                showStatus('🗑️ All data cleared', 'info');
                showResults(`
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 10px 0;">
                        <h3>🗑️ Data Cleared</h3>
                        <p>All products, orders, and customers have been removed from localStorage.</p>
                        <p>Click "Create Sample Data" to add sample data again.</p>
                    </div>
                `);
            }
        }

        function openAdminPanel() {
            window.open('admin.html', '_blank');
        }

        // Auto-check on load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(checkCurrentData, 500);
        });
    </script>
</body>
</html>
