<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 4px; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 10px; }
        button:hover { background: #0056b3; }
        .test-result { margin: 10px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .connection-time { font-size: 1.2em; font-weight: bold; color: #007bff; }
        .progress { width: 100%; height: 20px; background: #f0f0f0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: #007bff; transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Backend Connection Test</h1>
        
        <div id="status" class="status info">
            Ready to test backend connection...
        </div>
        
        <button onclick="testBackendConnection()">🔍 Test Backend Connection</button>
        <button onclick="testLocalStorage()">💾 Test LocalStorage Speed</button>
        <button onclick="startBackend()">🚀 Start Backend Server</button>
        <button onclick="testFullFlow()">🔄 Test Full Order Flow</button>
        
        <div class="progress" id="progressBar" style="display: none;">
            <div class="progress-bar" id="progressFill"></div>
        </div>
        
        <div id="results"></div>
        
        <div id="connectionHistory">
            <h3>📊 Connection History</h3>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Test Type</th>
                        <th>Response Time</th>
                        <th>Status</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- Connection history will be shown here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let connectionHistory = [];

        function showStatus(message, type = 'info') {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function showResults(content) {
            document.getElementById('results').innerHTML = content;
        }

        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (percent > 0) {
                progressBar.style.display = 'block';
                progressFill.style.width = percent + '%';
            } else {
                progressBar.style.display = 'none';
            }
        }

        async function testBackendConnection() {
            showStatus('Testing backend connection...', 'info');
            updateProgress(10);
            
            const startTime = performance.now();
            
            try {
                updateProgress(30);
                
                // Test backend connection
                const response = await fetch('http://localhost:8080/api/orders', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                updateProgress(70);
                
                const endTime = performance.now();
                const connectionTime = (endTime - startTime).toFixed(2);
                
                updateProgress(100);
                
                if (response.ok) {
                    showStatus('✅ Backend connected successfully!', 'success');
                    showResults(`
                        <div class="test-result">
                            <h3>✅ Backend Connection Successful</h3>
                            <p><strong>Connection Time:</strong> <span class="connection-time">${connectionTime}ms</span></p>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Backend URL:</strong> http://localhost:8080</p>
                            <p><strong>Response:</strong> Server is running and responding</p>
                        </div>
                    `);
                    
                    addToHistory('Backend Connection', connectionTime, 'Success');
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
                
            } catch (error) {
                updateProgress(0);
                const endTime = performance.now();
                const connectionTime = (endTime - startTime).toFixed(2);
                
                showStatus('❌ Backend connection failed', 'error');
                showResults(`
                    <div class="test-result">
                        <h3>❌ Backend Connection Failed</h3>
                        <p><strong>Connection Time:</strong> <span class="connection-time">${connectionTime}ms</span></p>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Solution:</strong> Start the backend server first</p>
                        <p><strong>Command:</strong> cd backend && javac simple.java && java simple</p>
                    </div>
                `);
                
                addToHistory('Backend Connection', connectionTime, 'Failed');
            }
            
            setTimeout(() => updateProgress(0), 1000);
        }

        function testLocalStorage() {
            showStatus('Testing LocalStorage speed...', 'info');
            updateProgress(10);
            
            const startTime = performance.now();
            
            // Test localStorage write
            const testData = {
                id: Date.now(),
                name: 'Test Product',
                price: 99.99,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('testData', JSON.stringify(testData));
            updateProgress(50);
            
            // Test localStorage read
            const retrieved = JSON.parse(localStorage.getItem('testData'));
            updateProgress(80);
            
            const endTime = performance.now();
            const storageTime = (endTime - startTime).toFixed(2);
            
            updateProgress(100);
            
            showStatus('✅ LocalStorage test completed!', 'success');
            showResults(`
                <div class="test-result">
                    <h3>✅ LocalStorage Performance</h3>
                    <p><strong>Write/Read Time:</strong> <span class="connection-time">${storageTime}ms</span></p>
                    <p><strong>Data Size:</strong> ${JSON.stringify(testData).length} bytes</p>
                    <p><strong>Status:</strong> Working perfectly</p>
                    <p><strong>Note:</strong> LocalStorage is much faster than backend</p>
                </div>
            `);
            
            addToHistory('LocalStorage', storageTime, 'Success');
            
            setTimeout(() => updateProgress(0), 1000);
        }

        function startBackend() {
            showStatus('Backend server startup instructions...', 'warning');
            showResults(`
                <div class="test-result">
                    <h3>🚀 Start Backend Server</h3>
                    <p><strong>Step 1:</strong> Open command prompt/terminal</p>
                    <p><strong>Step 2:</strong> Navigate to backend folder</p>
                    <code>cd "c:/Users/Dell/OneDrive/New folder/OnlineShoppingCart/backend"</code>
                    <p><strong>Step 3:</strong> Compile Java file</p>
                    <code>javac simple.java</code>
                    <p><strong>Step 4:</strong> Run backend server</p>
                    <code>java simple</code>
                    <p><strong>Expected Output:</strong></p>
                    <code>ShopHub Backend Starting...<br>Server would start on: http://localhost:8080/api</code>
                    <p><strong>Startup Time:</strong> 2-5 seconds</p>
                    <p><strong>Connection Time:</strong> 10-50ms once running</p>
                </div>
            `);
        }

        async function testFullFlow() {
            showStatus('Testing full order flow...', 'info');
            updateProgress(10);
            
            const startTime = performance.now();
            
            try {
                // Step 1: Create test order
                const testOrder = {
                    id: Date.now().toString(),
                    customer: 'Test Customer',
                    items: [
                        { name: 'Test Product', price: 99.99, quantity: 1 }
                    ],
                    total: 99.99,
                    status: 'pending',
                    date: new Date().toISOString()
                };
                
                updateProgress(30);
                
                // Step 2: Save to localStorage (current method)
                localStorage.setItem('orders', JSON.stringify([testOrder]));
                updateProgress(50);
                
                // Step 3: Try backend (if available)
                try {
                    const response = await fetch('http://localhost:8080/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(testOrder)
                    });
                    
                    if (response.ok) {
                        updateProgress(80);
                        const result = await response.json();
                        console.log('Backend order created:', result);
                    }
                } catch (backendError) {
                    console.log('Backend not available, using localStorage only');
                }
                
                updateProgress(90);
                
                // Step 4: Verify order saved
                const savedOrders = JSON.parse(localStorage.getItem('orders') || '[]');
                const orderFound = savedOrders.find(order => order.id === testOrder.id);
                
                const endTime = performance.now();
                const totalTime = (endTime - startTime).toFixed(2);
                
                updateProgress(100);
                
                if (orderFound) {
                    showStatus('✅ Full order flow completed!', 'success');
                    showResults(`
                        <div class="test-result">
                            <h3>✅ Full Order Flow Successful</h3>
                            <p><strong>Total Time:</strong> <span class="connection-time">${totalTime}ms</span></p>
                            <p><strong>Order ID:</strong> ${testOrder.id}</p>
                            <p><strong>Customer:</strong> ${testOrder.customer}</p>
                            <p><strong>Total:</strong> $${testOrder.total}</p>
                            <p><strong>Status:</strong> ${orderFound.status}</p>
                            <p><strong>Storage:</strong> LocalStorage (Backend: ${backendError ? 'Not Available' : 'Available'})</p>
                        </div>
                    `);
                    
                    addToHistory('Full Order Flow', totalTime, 'Success');
                } else {
                    throw new Error('Order not found after save');
                }
                
            } catch (error) {
                updateProgress(0);
                showStatus('❌ Full order flow failed', 'error');
                showResults(`
                    <div class="test-result">
                        <h3>❌ Order Flow Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Solution:</strong> Check localStorage and backend connection</p>
                    </div>
                `);
            }
            
            setTimeout(() => updateProgress(0), 1000);
        }

        function addToHistory(testType, responseTime, status) {
            const history = {
                testType,
                responseTime: responseTime + 'ms',
                status,
                timestamp: new Date().toLocaleTimeString()
            };
            
            connectionHistory.unshift(history);
            
            // Keep only last 10 records
            if (connectionHistory.length > 10) {
                connectionHistory = connectionHistory.slice(0, 10);
            }
            
            updateHistoryTable();
        }

        function updateHistoryTable() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            
            connectionHistory.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.testType}</td>
                    <td>${record.responseTime}</td>
                    <td><span class="status ${record.status.toLowerCase() === 'success' ? 'success' : 'error'}">${record.status}</span></td>
                    <td>${record.timestamp}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Auto-test on load
        document.addEventListener('DOMContentLoaded', () => {
            showStatus('🔗 Backend connection test ready!', 'info');
            updateHistoryTable();
        });
    </script>
</body>
</html>
