<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 4px; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 10px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 ShopHub Server Connection Test</h1>
        
        <div id="status" class="status info">
            Testing server connection...
        </div>
        
        <button onclick="testConnection()">🌐 Test Connection</button>
        <button onclick="testSignup()">👥 Test Signup</button>
        <button onclick="testLogin()">🔐 Test Login</button>
        
        <div id="results"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';

        function showStatus(message, type = 'info') {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function showResults(content) {
            document.getElementById('results').innerHTML = content;
        }

        async function testConnection() {
            showStatus('Testing basic connection...', 'info');
            
            try {
                const response = await fetch(API_BASE_URL);
                const text = await response.text();
                
                if (response.ok) {
                    showStatus('✅ Server is running and responding!', 'success');
                    showResults(`
                        <div class="test-result">
                            <h3>✅ Connection Successful</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Response:</strong></p>
                            <pre>${text}</pre>
                        </div>
                    `);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                showStatus('❌ Server connection failed!', 'error');
                showResults(`
                    <div class="test-result">
                        <h3>❌ Connection Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <h4>🔧 Solutions:</h4>
                        <ul>
                            <li>Make sure backend server is running on port 8080</li>
                            <li>Check if Java is installed and working</li>
                            <li>Try restarting the backend server</li>
                            <li>Check for firewall blocking port 8080</li>
                        </ul>
                    </div>
                `);
            }
        }

        async function testSignup() {
            showStatus('Testing signup API...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        password: 'test123',
                        userType: 'CUSTOMER'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showStatus('✅ Signup API working!', 'success');
                    showResults(`
                        <div class="test-result">
                            <h3>✅ Signup Test Successful</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `);
                } else {
                    throw new Error(data.message || 'Signup failed');
                }
            } catch (error) {
                showStatus('❌ Signup API failed!', 'error');
                showResults(`
                    <div class="test-result">
                        <h3>❌ Signup Test Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `);
            }
        }

        async function testLogin() {
            showStatus('Testing login API...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        password: 'test123',
                        userType: 'CUSTOMER'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showStatus('✅ Login API working!', 'success');
                    showResults(`
                        <div class="test-result">
                            <h3>✅ Login Test Successful</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `);
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (error) {
                showStatus('❌ Login API failed!', 'error');
                showResults(`
                    <div class="test-result">
                        <h3>❌ Login Test Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `);
            }
        }

        // Auto-test on page load
        document.addEventListener('DOMContentLoaded', () => {
            testConnection();
        });
    </script>
</body>
</html>
