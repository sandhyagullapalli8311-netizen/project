<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Status</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 4px; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 10px; }
        button:hover { background: #0056b3; }
        .server-info { background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 10px 0; }
        .endpoint { background: #e9ecef; padding: 10px; margin: 5px 0; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Backend Server Status</h1>
        
        <div id="status" class="status info">
            Checking backend status...
        </div>
        
        <button onclick="checkBackendStatus()">🔄 Check Status</button>
        <button onclick="testEndpoints()">🧪 Test Endpoints</button>
        <button onclick="openAdminPanel()">🏪 Open Admin Panel</button>
        
        <div id="serverInfo"></div>
        <div id="testResults"></div>
    </div>

    <script>
        function showStatus(message, type = 'info') {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function showServerInfo(info) {
            document.getElementById('serverInfo').innerHTML = info;
        }

        function showTestResults(results) {
            document.getElementById('testResults').innerHTML = results;
        }

        async function checkBackendStatus() {
            showStatus('Checking backend status...', 'info');
            
            try {
                const startTime = performance.now();
                
                const response = await fetch('http://localhost:8080/', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const endTime = performance.now();
                const responseTime = (endTime - startTime).toFixed(2);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    showStatus('✅ Backend Server Connected!', 'success');
                    showServerInfo(`
                        <div class="server-info">
                            <h3>🚀 Server Information</h3>
                            <p><strong>Status:</strong> ${data.status}</p>
                            <p><strong>Message:</strong> ${data.message}</p>
                            <p><strong>Response Time:</strong> ${responseTime}ms</p>
                            <p><strong>Timestamp:</strong> ${data.timestamp}</p>
                            <p><strong>Available Endpoints:</strong></p>
                            ${data.endpoints.map(ep => `<div class="endpoint">http://localhost:8080${ep}</div>`).join('')}
                        </div>
                    `);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
                
            } catch (error) {
                showStatus('❌ Backend Server Not Connected', 'error');
                showServerInfo(`
                    <div class="server-info">
                        <h3>❌ Connection Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Solution:</strong> Make sure the backend server is running</p>
                        <p><strong>Command:</strong> cd backend && java BackendServer</p>
                        <p><strong>Expected:</strong> Server running on http://localhost:8080</p>
                    </div>
                `);
            }
        }

        async function testEndpoints() {
            showStatus('Testing endpoints...', 'info');
            
            const endpoints = [
                { path: '/', method: 'GET', name: 'Root Endpoint' },
                { path: '/api/orders', method: 'GET', name: 'Get Orders' },
                { path: '/api/products', method: 'GET', name: 'Get Products' },
                { path: '/api/users', method: 'GET', name: 'Get Users' },
                { path: '/api/orders', method: 'POST', name: 'Create Order', body: '{"customer":"Test User","total":99.99}' },
                { path: '/api/products', method: 'POST', name: 'Create Product', body: '{"name":"Test Product","price":99.99}' },
                { path: '/api/users', method: 'POST', name: 'Create User', body: '{"name":"Test User","email":"test@example.com"}' }
            ];
            
            let results = '<h3>🧪 Endpoint Test Results</h3>';
            let passed = 0;
            let failed = 0;
            
            for (const endpoint of endpoints) {
                try {
                    const startTime = performance.now();
                    
                    const options = {
                        method: endpoint.method,
                        headers: { 'Content-Type': 'application/json' }
                    };
                    
                    if (endpoint.body) {
                        options.body = endpoint.body;
                    }
                    
                    const response = await fetch(`http://localhost:8080${endpoint.path}`, options);
                    const endTime = performance.now();
                    const responseTime = (endTime - startTime).toFixed(2);
                    
                    if (response.ok) {
                        const data = await response.json();
                        results += `
                            <div class="server-info" style="border-left: 4px solid #28a745;">
                                <h4>✅ ${endpoint.name}</h4>
                                <p><strong>Method:</strong> ${endpoint.method} ${endpoint.path}</p>
                                <p><strong>Status:</strong> ${response.status}</p>
                                <p><strong>Response Time:</strong> ${responseTime}ms</p>
                                <p><strong>Response:</strong> ${JSON.stringify(data).substring(0, 100)}...</p>
                            </div>
                        `;
                        passed++;
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                } catch (error) {
                    results += `
                        <div class="server-info" style="border-left: 4px solid #dc3545;">
                            <h4>❌ ${endpoint.name}</h4>
                            <p><strong>Method:</strong> ${endpoint.method} ${endpoint.path}</p>
                            <p><strong>Error:</strong> ${error.message}</p>
                        </div>
                    `;
                    failed++;
                }
            }
            
            results += `
                <div class="server-info">
                    <h3>📊 Test Summary</h3>
                    <p><strong>Passed:</strong> ${passed}</p>
                    <p><strong>Failed:</strong> ${failed}</p>
                    <p><strong>Total:</strong> ${passed + failed}</p>
                    <p><strong>Success Rate:</strong> ${((passed / (passed + failed)) * 100).toFixed(1)}%</p>
                </div>
            `;
            
            showTestResults(results);
            
            if (failed === 0) {
                showStatus('✅ All endpoints working!', 'success');
            } else {
                showStatus(`⚠️ ${failed} endpoints failed`, 'error');
            }
        }

        function openAdminPanel() {
            window.open('admin.html', '_blank');
        }

        // Auto-check on load
        document.addEventListener('DOMContentLoaded', () => {
            checkBackendStatus();
        });
    </script>
</body>
</html>
